<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>X-Paddock</title>
  <link rel="icon" href="./favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">
  <link rel="manifest" href="./site.webmanifest">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=https://paddockgridx.app/login">
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 2rem; display: grid; place-items: center; min-height: 100vh; color: #111; background: #fff; }
    a { color: #2563eb; }
  </style>
  <script>
    (function() {
      var target = "https://paddockgridx.app/login";
      try {
        window.location.replace(target);
      } catch (e) {
        window.location.href = target;
      }
    })();
  </script>
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="googlebot" content="noindex, nofollow, noarchive">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
</head>
<body>
  <noscript>
    <p>JavaScript is disabled. Continue to the admin dashboard:</p>
    <p><a href="https://paddockgridx.app/login">Go to X-Paddock</a></p>
  </noscript>
  <img src="Paddock.png" alt="Paddock" style="max-width: min(420px, 80vw); height: auto;">
  <p>If you are not redirected, <a href="https://paddockgridx.app/login" rel="noopener">click here</a>.</p>
  <script>
(function(){
	document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
	document.addEventListener('keydown', function(e){
		if (e.key === 'F12') { e.preventDefault(); return false; }
		if ((e.ctrlKey || e.metaKey) && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) { e.preventDefault(); return false; }
		if ((e.ctrlKey || e.metaKey) && e.key.toUpperCase() === 'U') { e.preventDefault(); return false; }
	});
})();
</script>
</body>
</html>
